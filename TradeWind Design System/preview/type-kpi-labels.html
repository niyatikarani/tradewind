<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; }
  .kpis { display: flex; gap: 28px; }
  .kpi .lbl { font: var(--text-caption); font-weight: 600; text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--fg2); }
  .kpi .num { font: var(--text-display); letter-spacing: var(--tracking-tight); margin-top: 4px; }
  .kpi .sub { font: var(--text-caption); color: var(--fg3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="kpis">
    <div class="kpi">
      <div class="lbl">Orders this month</div>
      <div class="num" style="color:var(--fg1)">14</div>
      <div class="sub">↑ 3 vs last month</div>
    </div>
    <div class="kpi">
      <div class="lbl">Avg. margin</div>
      <div class="num" style="color:var(--emerald-600)">12.4%</div>
      <div class="sub">↑ 1.2pp vs last quarter</div>
    </div>
    <div class="kpi">
      <div class="lbl">Overdue tasks</div>
      <div class="num" style="color:var(--red-text)">2</div>
      <div class="sub">needs attention</div>
    </div>
  </div>
</body>
</html>
