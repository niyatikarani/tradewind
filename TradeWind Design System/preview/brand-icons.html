<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 16px 10px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic i { font-size: 22px; color: var(--slate-700); }
  .ic span { font-size: 9.5px; color: var(--fg3); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="ic"><i class="ti ti-layout-dashboard"></i><span>dashboard</span></div>
    <div class="ic"><i class="ti ti-file-invoice"></i><span>invoice</span></div>
    <div class="ic"><i class="ti ti-brain"></i><span>brain</span></div>
    <div class="ic"><i class="ti ti-file-text"></i><span>file-text</span></div>
    <div class="ic"><i class="ti ti-checklist"></i><span>checklist</span></div>
    <div class="ic"><i class="ti ti-chart-bar"></i><span>chart-bar</span></div>
    <div class="ic"><i class="ti ti-settings"></i><span>settings</span></div>
    <div class="ic"><i class="ti ti-sparkles"></i><span>sparkles</span></div>
    <div class="ic"><i class="ti ti-cloud-upload"></i><span>upload</span></div>
    <div class="ic"><i class="ti ti-paperclip"></i><span>paperclip</span></div>
    <div class="ic"><i class="ti ti-send"></i><span>send</span></div>
    <div class="ic"><i class="ti ti-circle-check"></i><span>check</span></div>
    <div class="ic"><i class="ti ti-alert-triangle"></i><span>warning</span></div>
    <div class="ic"><i class="ti ti-alert-circle"></i><span>error</span></div>
    <div class="ic"><i class="ti ti-lock"></i><span>lock</span></div>
    <div class="ic"><i class="ti ti-clock"></i><span>clock</span></div>
    <div class="ic"><i class="ti ti-book"></i><span>book</span></div>
    <div class="ic"><i class="ti ti-bell"></i><span>bell</span></div>
    <div class="ic"><i class="ti ti-plus"></i><span>plus</span></div>
    <div class="ic"><i class="ti ti-ship"></i><span>ship</span></div>
    <div class="ic"><i class="ti ti-file-type-pdf"></i><span>pdf</span></div>
    <div class="ic"><i class="ti ti-photo"></i><span>photo</span></div>
    <div class="ic"><i class="ti ti-file-spreadsheet"></i><span>sheet</span></div>
    <div class="ic"><i class="ti ti-user"></i><span>user</span></div>
  </div>
</body>
</html>
