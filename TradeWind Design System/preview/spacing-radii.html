<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .item { text-align: center; }
  .box { background: var(--emerald-50); border: 1.5px solid var(--emerald-500); width: 64px; height: 56px; }
  .name { font: var(--text-caption); color: var(--fg1); font-weight: 600; margin-top: 8px; }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="val">6px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">lg · cards</div><div class="val">10px</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="name">xl</div><div class="val">14px</div></div>
    <div class="item"><div class="box" style="border-radius:9999px; width:56px"></div><div class="name">full</div><div class="val">9999px</div></div>
  </div>
</body>
</html>
