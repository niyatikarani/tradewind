<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--slate-50); }
  .row { display: flex; gap: 26px; }
  .item { text-align: center; flex: 1; }
  .box { background: #fff; height: 60px; border-radius: 10px; }
  .b1 { box-shadow: var(--shadow-card); border: 1px solid var(--border); }
  .b2 { box-shadow: var(--shadow-raised); }
  .b3 { box-shadow: var(--shadow-modal); }
  .b4 { border: 1px solid var(--emerald-500); box-shadow: var(--ring-focus); }
  .name { font: var(--text-caption); color: var(--fg1); font-weight: 600; margin-top: 10px; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg2); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box b1"></div><div class="name">Card</div><div class="val">0 1px 3px / .05</div></div>
    <div class="item"><div class="box b2"></div><div class="name">Raised</div><div class="val">0 4px 12px / .08</div></div>
    <div class="item"><div class="box b3"></div><div class="name">Modal</div><div class="val">0 20px 48px / .18</div></div>
    <div class="item"><div class="box b4"></div><div class="name">Focus ring</div><div class="val">emerald 25%</div></div>
  </div>
</body>
</html>
