<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-sans); }
  .nav { width: 220px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 14px; font: var(--text-label); color: var(--slate-600); border-radius: 8px; border-left: 3px solid transparent; cursor: pointer; }
  .nav-item i { font-size: 18px; }
  .nav-item:hover { background: var(--slate-50); }
  .nav-item.active { background: var(--emerald-50); color: var(--emerald-600); border-left-color: var(--emerald-500); border-radius: 0 8px 8px 0; font-weight: 600; }
  .nav-item.active i { color: var(--emerald-500); }
</style>
</head>
<body>
  <div class="nav">
    <div class="nav-item active"><i class="ti ti-brain"></i>AI Intake</div>
    <div class="nav-item"><i class="ti ti-layout-dashboard"></i>Dashboard</div>
    <div class="nav-item"><i class="ti ti-file-invoice"></i>Orders</div>
    <div class="nav-item"><i class="ti ti-checklist"></i>Tasks</div>
  </div>
</body>
</html>
