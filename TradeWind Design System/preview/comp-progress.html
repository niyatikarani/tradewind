<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; font-family: var(--font-sans); }
  .item { margin-bottom: 16px; }
  .item:last-child { margin-bottom: 0; }
  .top { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
  .top .lbl { color: var(--fg1); font-weight: 600; }
  .top .frac { color: var(--fg2); font-family: var(--font-mono); }
  .track { height: 7px; border-radius: 9999px; background: var(--slate-100); overflow: hidden; }
  .fill { height: 100%; border-radius: 9999px; }
</style>
</head>
<body>
  <div class="item">
    <div class="top"><span class="lbl">SO-089 · On track</span><span class="frac">6/9</span></div>
    <div class="track"><div class="fill" style="width:67%; background:var(--emerald-500)"></div></div>
  </div>
  <div class="item">
    <div class="top"><span class="lbl">SO-090 · At risk</span><span class="frac">3/8</span></div>
    <div class="track"><div class="fill" style="width:37%; background:var(--amber-500)"></div></div>
  </div>
  <div class="item">
    <div class="top"><span class="lbl">SO-091 · Early stage</span><span class="frac">2/8</span></div>
    <div class="track"><div class="fill" style="width:25%; background:var(--slate-400)"></div></div>
  </div>
</body>
</html>
