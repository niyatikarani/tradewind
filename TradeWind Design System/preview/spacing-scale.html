<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; }
  .row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .bar { background: var(--emerald-500); height: 14px; border-radius: 3px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg1); width: 64px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg2); }
</style>
</head>
<body>
  <div class="row"><span class="tok">space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="tok">space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="tok">space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="tok">space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="tok">space-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="tok">space-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="tok">space-12</span><div class="bar" style="width:48px"></div><span class="px">48px · 4px base scale</span></div>
</body>
</html>
