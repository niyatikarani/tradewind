<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: #fff; font-family: var(--font-sans); }
  .ramp { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .sw { flex: 1; height: 64px; display: flex; align-items: flex-end; padding: 6px; box-sizing: border-box; }
  .sw span { font-size: 10px; font-weight: 600; }
  .labels { display: flex; margin-top: 8px; }
  .labels div { flex: 1; font-size: 11px; color: var(--fg2); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw" style="background:#f8fafc"><span style="color:#475569">50</span></div>
    <div class="sw" style="background:#f1f5f9"><span style="color:#475569">100</span></div>
    <div class="sw" style="background:#e2e8f0"><span style="color:#475569">200</span></div>
    <div class="sw" style="background:#cbd5e1"><span style="color:#334155">300</span></div>
    <div class="sw" style="background:#94a3b8"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:#64748b"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:#475569"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:#334155"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:#1e293b"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:#0f172a"><span style="color:#fff">900</span></div>
  </div>
  <div class="labels">
    <div>50</div><div>100</div><div>200</div><div>300</div><div>400</div><div>500</div><div>600</div><div>700</div><div>800</div><div>900</div>
  </div>
</body>
</html>
