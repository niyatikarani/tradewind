<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 0; font-family: "Inter", sans-serif; }
  .wrap { display: flex; }
  .light { flex: 1; background: #fff; display: flex; align-items: center; justify-content: center; padding: 28px; border-right: 1px solid #e2e8f0; }
  .dark { flex: 1; background: #0f172a; display: flex; align-items: center; justify-content: center; padding: 28px; }
  .mark { display: flex; align-items: center; gap: 11px; }
  .sq { width: 38px; height: 38px; border-radius: 9px; background: #10b981; display:flex; align-items:center; justify-content:center; }
  .word { font-size: 21px; font-weight: 700; letter-spacing: -0.4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="light">
      <div class="mark">
        <img src="../assets/logomark.svg" width="38" height="38" alt="">
        <span class="word" style="color:#0f172a">Trade<span style="color:#059669">Wind</span></span>
      </div>
    </div>
    <div class="dark">
      <div class="mark">
        <img src="../assets/logomark.svg" width="38" height="38" alt="">
        <span class="word" style="color:#fff">Trade<span style="color:#34d399">Wind</span></span>
      </div>
    </div>
  </div>
</body>
</html>
