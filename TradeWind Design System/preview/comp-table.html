<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: #fff; font-family: var(--font-sans); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--fg2); background: var(--slate-50); padding: 9px 12px; border-bottom: 1px solid var(--border); }
  tbody td { padding: 11px 12px; border-bottom: 1px solid var(--border); color: var(--fg1); }
  tbody tr:last-child td { border-bottom: none; }
  .mono { font-family: var(--font-mono); font-size: 12px; }
  .badge { font-size: 11px; font-weight: 700; border-radius: 6px; padding: 3px 8px; }
  .green { background: var(--green-bg); color: var(--green-text); }
  .amber { background: var(--amber-bg); color: var(--amber-text); }
</style>
</head>
<body>
  <table>
    <thead><tr><th>SKU</th><th>Description</th><th>Qty</th><th>Incoterm</th><th>Conf.</th></tr></thead>
    <tbody>
      <tr><td class="mono">CINN-STICKS-001</td><td>Cinnamon Sticks</td><td>500 kg</td><td>CIF</td><td><span class="badge green">96%</span></td></tr>
      <tr><td class="mono">CARD-BOLD-7MM</td><td>Green Cardamom Bold 7mm</td><td>200 kg</td><td>CIF</td><td><span class="badge amber">81%</span></td></tr>
    </tbody>
  </table>
</body>
</html>
