<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
  body { margin: 0; padding: 22px 24px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; }
  .av { width: 26px; height: 26px; border-radius: 9999px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600; }
  .task { display: flex; align-items: center; gap: 9px; font-size: 13px; }
  .task i { font-size: 17px; }
  .done { color: var(--fg3); text-decoration: line-through; }
  .done i { color: var(--green-text); }
  .prog { color: var(--fg1); }
  .prog .pill { background: var(--amber-bg); color: var(--amber-text); font-size: 10.5px; font-weight: 600; border-radius: 6px; padding: 2px 7px; }
  .over { color: var(--red-text); }
  .over .pill { background: var(--red-bg); color: var(--red-text); font-size: 10.5px; font-weight: 600; border-radius: 6px; padding: 2px 7px; }
</style>
</head>
<body>
  <div style="display:flex; flex-direction:column; gap:13px;">
    <div class="task done"><i class="ti ti-circle-check-filled"></i>Kosher cert attached to order</div>
    <div class="task prog"><i class="ti ti-circle" style="color:var(--amber-text)"></i>Packing floor briefed <span class="pill">In Progress</span>
      <div class="av" style="background:#0ea5e9">S</div></div>
    <div class="task over"><i class="ti ti-clock" style="color:var(--red-text)"></i>Raw material received <span class="pill">Overdue</span>
      <div class="av" style="background:#8b5cf6">P</div></div>
  </div>
</body>
</html>
